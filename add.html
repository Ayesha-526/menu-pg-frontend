<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Menu</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/add.css">
</head>
<body>

<div class="container">
    <h2>🍽 Add Menu</h2>

    <input type="date" id="date">

    <input type="text" id="breakfast" placeholder="Breakfast">
    <input type="text" id="lunch" placeholder="Lunch">
    <input type="text" id="dinner" placeholder="Dinner">

    <button id="addBtn">➕ Add Menu</button>
</div>

<!-- JS -->
<script src="js/add.js"></script>

<!-- 🔥 IMPORTANT: connect button to JS -->
<script>
    document.getElementById("addBtn").addEventListener("click", addMenu);
</script>

</body>
</html>
